<!DOCTYPE html>
<html lang="ru" data-site-nav-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Септаккорды: мобильный fullscreen</title>
  <link rel="stylesheet" href="template-synth.css" />
  <link rel="stylesheet" href="keyboard-piano.css" />
  <link rel="stylesheet" href="bayan-keyboard.css" />
  <link rel="stylesheet" href="circle-scales.css" />
  <link rel="stylesheet" href="mobile-shell.css" />
  <link rel="stylesheet" href="seventh-chords-mobile.css" />
  <link rel="stylesheet" href="../site-nav.css" />
</head>
<body>
  <main
    class="sc7m-page mobile-shell mobile-shell--force synth-kit-root cts-synth-root"
    id="sc7m-root"
    aria-label="Септаккорды: мобильный swipe"
  >
    <div class="mobile-shell__viewport">
      <div class="mobile-shell__track" role="group" aria-label="Экраны приложения">
        <section class="mobile-shell__panel sc7m-panel sc7m-panel--keyboard" aria-label="Клавиатура">
          <section class="sc7m-keyboard-panel cts-piano-panel" aria-label="Клавиатура">
            <div id="sc7m-keyboard-stage" class="sc7m-keyboard-stage cts-keyboard-stage">
              <div id="sc7m-keys-linear" class="cts-kbd-view">
                <div class="ntg-keys-wrap" aria-label="Ноты по октавам (линейная раскладка)"></div>
              </div>
              <div id="sc7m-keys-piano" class="cts-kbd-view" hidden>
                <div class="cts-scroll-x">
                  <div class="cts-piano-keyboard" role="group" aria-label="Ноты по октавам (раскладка пиано)"></div>
                </div>
              </div>
              <div id="sc7m-keys-bayiano" class="cts-kbd-view" hidden>
                <div class="cts-scroll-x cts-bayan-scroll">
                  <div id="sc7m-bayan-wrap" class="cts-bayan-wrap" aria-label="Баян B-system"></div>
                </div>
              </div>
              <div id="sc7m-keys-bayiano4" class="cts-kbd-view" hidden>
                <div class="cts-scroll-x cts-bayan-scroll">
                  <div
                    id="sc7m-bayan4-wrap"
                    class="cts-bayan-wrap cts-bayan4-wrap"
                    aria-label="Четырёхрядная хроматическая сетка (баян)"
                  ></div>
                </div>
              </div>
            </div>
          </section>

          <footer class="sc7m-kbdbar" aria-label="Выбор клавиатуры">
            <span class="sc7m-kbdbar-label" id="sc7m-kbd-toolbar-label">Клавиши</span>
            <div
              id="sc7m-kbd-mode-group"
              class="sc7m-kbd-seg"
              role="group"
              aria-labelledby="sc7m-kbd-toolbar-label"
            >
              <button type="button" class="sc7m-kbd-btn" data-sc7m-kbd-mode="linear" aria-pressed="false">linear</button>
              <button type="button" class="sc7m-kbd-btn" data-sc7m-kbd-mode="piano" aria-pressed="true">piano</button>
              <button type="button" class="sc7m-kbd-btn" data-sc7m-kbd-mode="bayiano" aria-pressed="false">bayiano</button>
              <button
                type="button"
                class="sc7m-kbd-btn"
                data-sc7m-kbd-mode="bayiano4"
                aria-pressed="false"
                title="Четыре ряда (хроматическая сетка мод 4), не B-system"
              >
                bayiano4
              </button>
            </div>
            <button type="button" class="sc7m-stop ntg-stop" id="sc7m-ntg-stop">Стоп</button>
            <button type="button" class="sc7m-fullscreen-btn" id="sc7m-fullscreen-toggle">Fullscreen</button>
          </footer>
        </section>

        <section class="mobile-shell__panel sc7m-panel sc7m-panel--chords" aria-label="Типы септаккордов">
          <header class="sc7m-panel-head">
            <h1 class="sc7m-title">Тип септаккорда</h1>
          </header>
          <nav class="sc7m-chords" aria-label="Типы септаккордов">
            <div id="sc7m-chord-buttons" class="sc7m-chord-buttons" role="group" aria-label="Типы септаккордов"></div>
          </nav>
        </section>

        <section class="mobile-shell__panel sc7m-panel sc7m-panel--sound" aria-label="Звук и камертон">
          <header class="sc7m-panel-head">
            <h1 class="sc7m-title">Звук</h1>
          </header>

          <div class="sc7m-tuning-row" aria-label="Камертон и диапазон октав">
            <label class="sc7m-tuning-field">
              <span class="sc7m-control-label">A4, Гц</span>
              <input type="number" id="sc7m-ntg-a4" min="1" max="2000" step="0.1" value="440" inputmode="decimal" />
            </label>
            <label class="sc7m-tuning-field">
              <span class="sc7m-control-label">Окт. мин</span>
              <input type="number" id="sc7m-ntg-octave-min" min="0" max="8" step="1" value="3" inputmode="numeric" />
            </label>
            <label class="sc7m-tuning-field">
              <span class="sc7m-control-label">Окт. макс</span>
              <input type="number" id="sc7m-ntg-octave-max" min="0" max="8" step="1" value="5" inputmode="numeric" />
            </label>
            <label class="sc7m-tuning-field sc7m-tuning-field--wave">
              <span class="sc7m-control-label">Волна</span>
              <select id="sc7m-ntg-waveform">
                <option value="sine" selected>Синус</option>
                <option value="triangle">Треуг.</option>
                <option value="square">Квадр.</option>
                <option value="sawtooth">Пила</option>
              </select>
            </label>
          </div>

          <input type="range" id="sc7m-ntg-volume" class="tpl-sr-only" min="0" max="100" value="25" tabindex="-1" aria-hidden="true" />
          <input type="range" id="sc7m-ntg-detune" class="tpl-sr-only" min="-50" max="50" value="0" tabindex="-1" aria-hidden="true" />
          <input type="range" id="sc7m-ntg-harm-mix" class="tpl-sr-only" min="0" max="100" value="40" tabindex="-1" aria-hidden="true" />
          <input type="range" id="sc7m-ntg-harm-rolloff" class="tpl-sr-only" min="0.3" max="2.5" value="1" step="0.05" tabindex="-1" aria-hidden="true" />
          <input type="range" id="sc7m-ntg-release-ms" class="tpl-sr-only" min="20" max="5000" value="120" step="10" tabindex="-1" aria-hidden="true" />

          <section class="sc7m-soundbar synth-kit-root" aria-label="Синтез">
            <div class="sc7m-sound-kit">
              <div class="sc7m-kit-cell">
                <span class="sc7m-control-label">Громк.</span>
                <div id="sc7m-ntg-mount-volume"></div>
                <div id="sc7m-ntg-seg-volume"></div>
              </div>
              <div class="sc7m-harmonics-wrap">
                <span class="sc7m-control-label">Обертоны</span>
                <div id="sc7m-ntg-harmonics" role="group" aria-label="Обертоны n=1…16"></div>
              </div>
              <div class="sc7m-kit-cell">
                <span class="sc7m-control-label">Детюн</span>
                <div id="sc7m-ntg-mount-detune"></div>
                <div id="sc7m-ntg-seg-detune"></div>
              </div>
              <div class="sc7m-kit-cell">
                <span class="sc7m-control-label">Спад</span>
                <div id="sc7m-ntg-mount-harm-rolloff"></div>
                <div id="sc7m-ntg-seg-harm-rolloff"></div>
              </div>
              <div class="sc7m-kit-cell">
                <span class="sc7m-control-label">Смесь</span>
                <div id="sc7m-ntg-mount-harm-mix"></div>
                <div id="sc7m-ntg-seg-harm-mix"></div>
              </div>
              <div class="sc7m-kit-cell sc7m-kit-cell--fader">
                <span class="sc7m-control-label">Угас.</span>
                <div id="sc7m-ntg-mount-release"></div>
                <p class="sc7m-release-label">Угасание: <strong id="sc7m-ntg-release-ms-val">120 мс</strong></p>
              </div>
            </div>
          </section>
        </section>
      </div>
    </div>

    <nav class="mobile-shell__pager" aria-label="Навигация по экранам">
      <span class="mobile-shell__counter" aria-live="polite">1 / 3</span>
      <div class="mobile-shell__dots"></div>
    </nav>
  </main>

  <div
    class="sc7m-start mobile-shell-portrait-sibling"
    id="sc7m-start-overlay"
    role="dialog"
    aria-labelledby="sc7m-start-title"
    aria-modal="true"
  >
    <div class="sc7m-start-card">
      <h2 id="sc7m-start-title">Септаккорды</h2>
      <p>
        Три экрана: клавиатура → тип аккорда → звук. Свайп влево/вправо. В portrait layout остаётся
        «широким» без поворота телефона.
      </p>
      <button type="button" id="sc7m-start-button">Открыть fullscreen</button>
      <button type="button" class="sc7m-start-skip" id="sc7m-start-skip">Продолжить</button>
      <p class="sc7m-orientation-note" id="sc7m-orientation-note" hidden>
        Fullscreen-ориентация недоступна — можно играть и так.
      </p>
    </div>
  </div>

  <script type="module" src="seventh-chords-mobile.mjs"></script>
</body>
</html>
